# SAGE determinism-harness port override (audit residual #6).
#
# Layered ON TOP of docker-compose.yml + docker-compose.test.yml to move the abci
# REST host ports OFF 18080-18083 (which a separately running bench/dev container
# may already bind) to 18090-18093. Uses Compose's `!override` tag (v2.24+) to
# REPLACE the merged `ports` list rather than append to it, so the base 8080 and
# test-override 18080 bindings are dropped. The CometBFT RPC ports (36657-36957)
# come from docker-compose.test.yml and are left as-is.
#
# Usage (always with -p sage-det so it never collides with other compose projects):
#   docker compose -p sage-det \
#     -f deploy/docker-compose.yml \
#     -f deploy/docker-compose.test.yml \
#     -f deploy/docker-compose.det.yml up -d --build
#
# Driven by deploy/scripts/run-determinism.sh / `make determinism`.

services:
  # All four abci replicas share ONE image (same for the cometbft four): the
  # base compose gives each service its own identical `build:` block, so
  # `up --build` cold-builds 8 independent images and their caches — enough to
  # exhaust Docker Desktop's VM disk. run-determinism.sh prebuilds the two
  # shared images once; `build` is reset here so `up --build` builds nothing.
  abci0:
    image: sage-det-abci:local
    build: !reset null
    ports: !override
      - "127.0.0.1:18090:8080"
  abci1:
    image: sage-det-abci:local
    build: !reset null
    ports: !override
      - "127.0.0.1:18091:8080"
  abci2:
    image: sage-det-abci:local
    build: !reset null
    ports: !override
      - "127.0.0.1:18092:8080"
  abci3:
    image: sage-det-abci:local
    build: !reset null
    ports: !override
      - "127.0.0.1:18093:8080"

  cometbft0:
    image: sage-det-node:local
    build: !reset null
  cometbft1:
    image: sage-det-node:local
    build: !reset null
  cometbft2:
    image: sage-det-node:local
    build: !reset null
  cometbft3:
    image: sage-det-node:local
    build: !reset null

  # The determinism run reaches postgres only over the internal docker network
  # (abci -> postgres:5432); it needs no host binding. Drop it so the run never
  # collides with a postgres already bound on the host's 5432.
  postgres:
    ports: !reset null
