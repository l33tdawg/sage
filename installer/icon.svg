<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0f30"/>
      <stop offset="100%" style="stop-color:#0d0818"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b5fd"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c5cbf"/>
    </linearGradient>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="centerGlow">
      <feGaussianBlur stdDeviation="24" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ringGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background: rounded square for app icon -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="512" cy="460" r="340" fill="none" stroke="#a78bfa" stroke-width="10" opacity="0.5" filter="url(#ringGlow)"/>

  <!-- Center glow -->
  <circle cx="512" cy="460" r="100" fill="#a78bfa" opacity="0.15" filter="url(#centerGlow)"/>

  <!-- Cross connections (lighter, behind main lines) -->
  <line x1="360" y1="330" x2="512" y2="200" stroke="#7c5cbf" stroke-width="5" opacity="0.35" stroke-linecap="round"/>
  <line x1="664" y1="330" x2="512" y2="200" stroke="#7c5cbf" stroke-width="5" opacity="0.35" stroke-linecap="round"/>
  <line x1="316" y1="560" x2="512" y2="690" stroke="#7c5cbf" stroke-width="5" opacity="0.35" stroke-linecap="round"/>
  <line x1="708" y1="560" x2="512" y2="690" stroke="#7c5cbf" stroke-width="5" opacity="0.35" stroke-linecap="round"/>
  <line x1="360" y1="330" x2="316" y2="560" stroke="#7c5cbf" stroke-width="5" opacity="0.35" stroke-linecap="round"/>
  <line x1="664" y1="330" x2="708" y2="560" stroke="#7c5cbf" stroke-width="5" opacity="0.35" stroke-linecap="round"/>

  <!-- Main connections to center -->
  <line x1="512" y1="460" x2="360" y2="330" stroke="#a78bfa" stroke-width="7" opacity="0.6" stroke-linecap="round"/>
  <line x1="512" y1="460" x2="664" y2="330" stroke="#a78bfa" stroke-width="7" opacity="0.6" stroke-linecap="round"/>
  <line x1="512" y1="460" x2="316" y2="560" stroke="#a78bfa" stroke-width="7" opacity="0.6" stroke-linecap="round"/>
  <line x1="512" y1="460" x2="708" y2="560" stroke="#a78bfa" stroke-width="7" opacity="0.6" stroke-linecap="round"/>
  <line x1="512" y1="460" x2="512" y2="200" stroke="#a78bfa" stroke-width="7" opacity="0.6" stroke-linecap="round"/>
  <line x1="512" y1="460" x2="512" y2="690" stroke="#a78bfa" stroke-width="7" opacity="0.6" stroke-linecap="round"/>

  <!-- Outer nodes -->
  <circle cx="360" cy="330" r="32" fill="#7c5cbf" filter="url(#nodeGlow)"/>
  <circle cx="664" cy="330" r="32" fill="#7c5cbf" filter="url(#nodeGlow)"/>
  <circle cx="316" cy="560" r="32" fill="#7c5cbf" filter="url(#nodeGlow)"/>
  <circle cx="708" cy="560" r="32" fill="#7c5cbf" filter="url(#nodeGlow)"/>
  <circle cx="512" cy="200" r="32" fill="#7c5cbf" filter="url(#nodeGlow)"/>
  <circle cx="512" cy="690" r="32" fill="#7c5cbf" filter="url(#nodeGlow)"/>

  <!-- Center node -->
  <circle cx="512" cy="460" r="52" fill="#a78bfa" filter="url(#centerGlow)"/>
  <circle cx="512" cy="460" r="26" fill="#e9d5ff" opacity="0.9"/>

  <!-- SAGE text -->
  <text x="512" y="860" text-anchor="middle"
        font-family="'SF Pro Display', 'Helvetica Neue', 'Segoe UI', sans-serif"
        font-weight="700" font-size="120" letter-spacing="16"
        fill="url(#glow)">SAGE</text>

  <!-- Subtle tagline -->
  <text x="512" y="920" text-anchor="middle"
        font-family="'SF Pro Text', 'Helvetica Neue', 'Segoe UI', sans-serif"
        font-weight="400" font-size="44" letter-spacing="6"
        fill="#a78bfa" opacity="0.6">AI MEMORY</text>
</svg>
