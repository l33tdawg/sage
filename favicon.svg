<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0f30"/>
      <stop offset="100%" style="stop-color:#0d0818"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b5fd"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c5cbf"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="512" cy="460" r="340" fill="none" stroke="#a78bfa" stroke-width="10" opacity="0.5"/>
  <!-- Connections -->
  <line x1="512" y1="460" x2="360" y2="330" stroke="#a78bfa" stroke-width="7" opacity="0.6" stroke-linecap="round"/>
  <line x1="512" y1="460" x2="664" y2="330" stroke="#a78bfa" stroke-width="7" opacity="0.6" stroke-linecap="round"/>
  <line x1="512" y1="460" x2="316" y2="560" stroke="#a78bfa" stroke-width="7" opacity="0.6" stroke-linecap="round"/>
  <line x1="512" y1="460" x2="708" y2="560" stroke="#a78bfa" stroke-width="7" opacity="0.6" stroke-linecap="round"/>
  <line x1="512" y1="460" x2="512" y2="200" stroke="#a78bfa" stroke-width="7" opacity="0.6" stroke-linecap="round"/>
  <line x1="512" y1="460" x2="512" y2="690" stroke="#a78bfa" stroke-width="7" opacity="0.6" stroke-linecap="round"/>
  <!-- Outer nodes -->
  <circle cx="360" cy="330" r="32" fill="#7c5cbf"/>
  <circle cx="664" cy="330" r="32" fill="#7c5cbf"/>
  <circle cx="316" cy="560" r="32" fill="#7c5cbf"/>
  <circle cx="708" cy="560" r="32" fill="#7c5cbf"/>
  <circle cx="512" cy="200" r="32" fill="#7c5cbf"/>
  <circle cx="512" cy="690" r="32" fill="#7c5cbf"/>
  <!-- Center node -->
  <circle cx="512" cy="460" r="52" fill="#a78bfa"/>
  <circle cx="512" cy="460" r="26" fill="#e9d5ff" opacity="0.9"/>
  <!-- SAGE text -->
  <text x="512" y="860" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="120" letter-spacing="16" fill="url(#glow)">SAGE</text>
  <text x="512" y="920" text-anchor="middle" font-family="sans-serif" font-weight="400" font-size="44" letter-spacing="6" fill="#a78bfa" opacity="0.6">AI MEMORY</text>
</svg>
