<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0f30"/>
      <stop offset="100%" style="stop-color:#0d0818"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b5fd"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c5cbf"/>
    </linearGradient>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="centerGlow">
      <feGaussianBlur stdDeviation="24" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ringGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="512" cy="512" r="480" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="512" cy="512" r="460" fill="none" stroke="#a78bfa" stroke-width="12" opacity="0.6" filter="url(#ringGlow)"/>

  <!-- Center glow -->
  <circle cx="512" cy="512" r="120" fill="#a78bfa" opacity="0.15" filter="url(#centerGlow)"/>

  <!-- Cross connections (lighter, behind main lines) -->
  <line x1="308" y1="358" x2="512" y2="225" stroke="#7c5cbf" stroke-width="6" opacity="0.35" stroke-linecap="round"/>
  <line x1="716" y1="358" x2="512" y2="225" stroke="#7c5cbf" stroke-width="6" opacity="0.35" stroke-linecap="round"/>
  <line x1="256" y1="614" x2="512" y2="768" stroke="#7c5cbf" stroke-width="6" opacity="0.35" stroke-linecap="round"/>
  <line x1="768" y1="614" x2="512" y2="768" stroke="#7c5cbf" stroke-width="6" opacity="0.35" stroke-linecap="round"/>
  <line x1="308" y1="358" x2="256" y2="614" stroke="#7c5cbf" stroke-width="6" opacity="0.35" stroke-linecap="round"/>
  <line x1="716" y1="358" x2="768" y2="614" stroke="#7c5cbf" stroke-width="6" opacity="0.35" stroke-linecap="round"/>

  <!-- Main connections to center -->
  <line x1="512" y1="512" x2="308" y2="358" stroke="#a78bfa" stroke-width="8" opacity="0.6" stroke-linecap="round"/>
  <line x1="512" y1="512" x2="716" y2="358" stroke="#a78bfa" stroke-width="8" opacity="0.6" stroke-linecap="round"/>
  <line x1="512" y1="512" x2="256" y2="614" stroke="#a78bfa" stroke-width="8" opacity="0.6" stroke-linecap="round"/>
  <line x1="512" y1="512" x2="768" y2="614" stroke="#a78bfa" stroke-width="8" opacity="0.6" stroke-linecap="round"/>
  <line x1="512" y1="512" x2="512" y2="225" stroke="#a78bfa" stroke-width="8" opacity="0.6" stroke-linecap="round"/>
  <line x1="512" y1="512" x2="512" y2="768" stroke="#a78bfa" stroke-width="8" opacity="0.6" stroke-linecap="round"/>

  <!-- Outer nodes -->
  <circle cx="308" cy="358" r="40" fill="#7c5cbf" filter="url(#nodeGlow)"/>
  <circle cx="716" cy="358" r="40" fill="#7c5cbf" filter="url(#nodeGlow)"/>
  <circle cx="256" cy="614" r="40" fill="#7c5cbf" filter="url(#nodeGlow)"/>
  <circle cx="768" cy="614" r="40" fill="#7c5cbf" filter="url(#nodeGlow)"/>
  <circle cx="512" cy="225" r="40" fill="#7c5cbf" filter="url(#nodeGlow)"/>
  <circle cx="512" cy="768" r="40" fill="#7c5cbf" filter="url(#nodeGlow)"/>

  <!-- Center node -->
  <circle cx="512" cy="512" r="64" fill="#a78bfa" filter="url(#centerGlow)"/>
  <circle cx="512" cy="512" r="32" fill="#e9d5ff" opacity="0.9"/>
</svg>
