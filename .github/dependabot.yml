version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    groups:
      go-deps:
        patterns:
          - "*"
    ignore:
      # go-libp2p is a pre-v1 module. Dependabot occasionally proposes the
      # unrelated legacy v6.0.23+incompatible line, whose split imports cannot
      # resolve against this module graph; keep real v0.x updates visible.
      - dependency-name: github.com/libp2p/go-libp2p
        versions:
          - ">= 1.0.0"

  - package-ecosystem: gomod
    directory: /natter
    schedule:
      interval: weekly
    groups:
      natter-go-deps:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      npm-deps:
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: /sdk/python
    schedule:
      interval: weekly
    groups:
      python-deps:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions-deps:
        patterns:
          - "*"
