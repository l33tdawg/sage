name: CI

on:
  push:
    branches: [main]
    tags-ignore: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25'
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2
          install-mode: binary
      - name: golangci-lint (natter)
        run: |
          cd natter
          golangci-lint run ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25'
          cache: true
      - name: Run tests
        run: go test ./... -v -count=1 -race -timeout 30m
      - name: Test local CometBFT hardening
        run: make test-cometbft-patch
      - name: Run natter tests
        run: |
          cd natter
          go test ./... -v -count=1 -race

  v119-fault-gates:
    name: v11.9 Multi-Process Fault Gates
    needs: test
    uses: ./.github/workflows/v11.9-fault-gates.yml
    with:
      # PR/main green must carry the same evidence required before a release
      # tag can publish artifacts.
      require_scoped_reconfiguration: true
      require_authorized_state_sync: true

  frontend-static:
    name: Frontend Static Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
      - run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test, frontend-static, v119-fault-gates]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25'
          cache: true
      - name: Build binary
        run: go build -o bin/amid ./cmd/amid

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build Docker images
        env:
          POSTGRES_PASSWORD: ci_build_only
        run: |
          docker compose -f deploy/docker-compose.yml build

  byzantine:
    name: Byzantine Fault Tests
    runs-on: ubuntu-latest
    needs: [build]
    env:
      POSTGRES_PASSWORD: ci_test_password
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25'
          cache: true
      - name: Initialize testnet
        run: bash deploy/init-testnet.sh
      - name: Start 4-validator network
        run: |
          docker compose -f deploy/docker-compose.yml up -d --build
          echo "Waiting for network to stabilize..."
          # Poll REST API health endpoints until all 4 ABCI nodes are ready
          for i in $(seq 1 60); do
            ALL_UP=true
            for port in 8080 8081 8082 8083; do
              if ! curl -sf "http://localhost:${port}/health" > /dev/null 2>&1; then
                ALL_UP=false
                break
              fi
            done
            if [ "$ALL_UP" = true ]; then
              echo "All 4 ABCI nodes healthy"
              break
            fi
            echo "Waiting for nodes... (attempt $i/60)"
            sleep 5
          done
          if [ "$ALL_UP" != true ]; then
            echo "Nodes failed to start in time"
            docker compose -f deploy/docker-compose.yml logs --tail=50
            exit 1
          fi
      - name: Run Byzantine fault tests
        run: go test ./test/byzantine/... -v -count=1 -timeout 120s -tags=byzantine
      - name: Stop network
        if: always()
        run: docker compose -f deploy/docker-compose.yml down -v --remove-orphans

  sdk-test:
    name: Python SDK Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Install SDK and test
        run: |
          cd sdk/python
          pip install -e ".[dev]"
          pytest -v
