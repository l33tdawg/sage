name: CodeQL

# Checked-in scan config so "what CodeQL is doing on this repo" is a
# git-tracked fact, mirroring how ci.yml + release.yml are checked in.
# Replaces the (transient) GitHub-UI default setup.

on:
  push:
    branches: [main]
    tags-ignore: ['v*']
  pull_request:
    branches: [main]
  schedule:
    # Weekly Sunday 06:00 UTC — scans the complete compiled graph even when
    # nobody pushes. Exact, reviewed upstream CometBFT findings are separated
    # from the reviewed upload below; every new dependency finding still lands
    # in Code Scanning, and the unfiltered upload document remains an artifact.
    - cron: '0 6 * * 0'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: go
            build-mode: autobuild
          - language: javascript-typescript
            build-mode: none
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Match the Go version pinned in ci.yml + release.yml so CodeQL
      # builds the same module graph the rest of CI sees. Drift here
      # would surface "works in CI, fails in CodeQL" oddities that
      # waste triage time.
      - if: matrix.language == 'go'
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.25'
          cache: true

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # security-extended adds queries beyond the default 'security-and-quality'
          # baseline — worth it for consensus-critical code where false-positive
          # noise is acceptable in exchange for catching subtler taint flows.
          queries: security-extended

      - name: Perform CodeQL Analysis
        id: analyze
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: '/language:${{ matrix.language }}'
          # Analyze everything, but do not let this action upload before the
          # exact inherited CometBFT baseline has been separated. A malformed
          # or drifting baseline fails before any filtered result is uploaded.
          upload: never
          output: '${{ runner.temp }}/codeql-raw'
          post-processed-sarif-path: '${{ runner.temp }}/codeql-unfiltered'

      - name: Preserve unfiltered CodeQL SARIF
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codeql-unfiltered-${{ matrix.language }}-${{ github.sha }}-${{ github.run_attempt }}
          path: '${{ runner.temp }}/codeql-unfiltered/upload.sarif'
          if-no-files-found: error
          retention-days: 30
          compression-level: 9

      - name: Separate audited CometBFT baseline findings
        run: |
          node scripts/filter-codeql-sarif.mjs \
            --manifest scripts/codeql-cometbft-baseline.json \
            --expected-automation-id "/language:${{ matrix.language }}/" \
            "$RUNNER_TEMP/codeql-unfiltered/upload.sarif" \
            "$RUNNER_TEMP/codeql-filtered/upload.sarif"

      - name: Upload filtered CodeQL SARIF
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: '${{ runner.temp }}/codeql-filtered/upload.sarif'
          category: '/language:${{ matrix.language }}'
          wait-for-processing: 'true'
