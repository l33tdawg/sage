name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing immutable release tag to resume
        required: true
        type: string

# The newest tag may be re-run to finish a failed publication step, but release
# writers for different tags must never race each other for the mutable
# `latest` pointers. The metadata gate rejects a stale stable tag before any
# package is built or published.
concurrency:
  group: sage-release-publication
  cancel-in-progress: false

# Note: the landing page is served from the `gh-pages` branch (GitHub Pages,
# legacy branch build). It is NOT deployed from this workflow — edit gh-pages
# directly to update the site. This workflow only builds release artifacts.
#
# Publication is deliberately two-phase:
#   1. validate, build, package, and checksum everything into private Actions
#      artifacts, then converge at `publication-gate`;
#   2. stage a private GitHub draft and publish each public channel serially.
# A failed public step can therefore be resumed without rebuilding or racing a
# second publisher, and the GitHub release plus mutable Docker `latest` pointer
# remain hidden until the immutable versioned channels have succeeded.
permissions:
  contents: read

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

jobs:
  release-metadata:
    name: Release Metadata Gate
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.metadata.outputs.tag }}
      version: ${{ steps.metadata.outputs.version }}
      prerelease: ${{ steps.metadata.outputs.prerelease }}
      native_shell_version: ${{ steps.metadata.outputs.native_shell_version }}
      native_shell_release_class: ${{ steps.metadata.outputs.native_shell_release_class }}
      native_shell_required: ${{ steps.metadata.outputs.native_shell_required }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.release_tag) || github.ref }}
          fetch-depth: 0

      - name: Validate tag and lockstep package metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ] &&
             [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            echo "::error::Automatic release runs must originate from a tag push"
            exit 1
          fi
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] &&
             [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "::error::Release recovery must use the protected main workflow"
            exit 1
          fi
          if [[ ! "${RELEASE_TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$ ]]; then
            echo "::error::Release tag must be canonical SemVer (vMAJOR.MINOR.PATCH with an optional prerelease)"
            exit 1
          fi

          TAG_COMMIT=$(git rev-parse "refs/tags/${RELEASE_TAG}^{commit}")
          CHECKED_OUT_COMMIT=$(git rev-parse HEAD)
          if [ "${TAG_COMMIT}" != "${CHECKED_OUT_COMMIT}" ]; then
            echo "::error::Checked-out commit does not match ${RELEASE_TAG}"
            exit 1
          fi
          git fetch --no-tags origin \
            +refs/heads/main:refs/remotes/origin/main
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] &&
             [ "${GITHUB_SHA}" != "$(git rev-parse refs/remotes/origin/main)" ]; then
            echo "::error::Release recovery workflow is not the current protected main commit"
            exit 1
          fi
          if ! git merge-base --is-ancestor "${TAG_COMMIT}" refs/remotes/origin/main; then
            echo "::error::Release tag commit must be reachable from protected main"
            exit 1
          fi

          VERSION="${RELEASE_TAG#v}"
          SDK_VERSION=$(sed -nE 's/^version = "([^"]+)"$/\1/p' sdk/python/pyproject.toml | head -1)
          INIT_VERSION=$(sed -nE 's/^__version__ = "([^"]+)"$/\1/p' sdk/python/src/sage_sdk/__init__.py | head -1)
          SERVER_VERSION=$(jq -er '.version' server.json)
          SERVER_IMAGE_COUNT=$(jq -er '[.packages[] | select(.registryType == "oci")] | length' server.json)
          SERVER_IMAGE=$(jq -er '.packages[] | select(.registryType == "oci") | .identifier' server.json)
          DASHBOARD_VERSION=$(sed -nE "s/^const SAGE_VERSION = 'v([^']+)';$/\1/p" web/static/js/app.js | head -1)
          VERSION_CORE=${VERSION%%-*}
          VERSION_MAJOR=${VERSION_CORE%%.*}
          VERSION_REMAINDER=${VERSION_CORE#*.}
          VERSION_MINOR=${VERSION_REMAINDER%%.*}
          NATIVE_SHELL_REQUIRED=false
          if [ "${VERSION_MAJOR}" -gt 11 ] ||
             { [ "${VERSION_MAJOR}" -eq 11 ] && [ "${VERSION_MINOR}" -ge 11 ]; }; then
            NATIVE_SHELL_REQUIRED=true
          fi
          NATIVE_SHELL_VERSION=not-required
          NATIVE_SHELL_CRATE_VERSION=not-required
          NATIVE_SHELL_PRODUCT_NAME=not-required
          NATIVE_SHELL_IDENTIFIER=not-required
          if [ "${NATIVE_SHELL_REQUIRED}" = true ]; then
            NATIVE_SHELL_VERSION=$(jq -er '.version' desktop/sage-shell/tauri.conf.json)
            NATIVE_SHELL_CRATE_VERSION=$(sed -nE 's/^version = "([^"]+)"$/\1/p' desktop/sage-shell/Cargo.toml | head -1)
            NATIVE_SHELL_PRODUCT_NAME=$(jq -er '.productName' desktop/sage-shell/tauri.conf.json)
            NATIVE_SHELL_IDENTIFIER=$(jq -er '.identifier' desktop/sage-shell/tauri.conf.json)
          fi

          echo "tag=${VERSION} pyproject=${SDK_VERSION} __init__=${INIT_VERSION} server=${SERVER_VERSION} dashboard=${DASHBOARD_VERSION} native_shell=${NATIVE_SHELL_VERSION}"
          if [ "${VERSION}" != "${SDK_VERSION}" ] ||
             [ "${VERSION}" != "${INIT_VERSION}" ] ||
             [ "${VERSION}" != "${SERVER_VERSION}" ] ||
             [ "${VERSION}" != "${DASHBOARD_VERSION}" ]; then
            echo "::error::Release metadata drift — bump the Python SDK, server.json, and dashboard fallback to ${VERSION} before tagging"
            exit 1
          fi
          if [ "${NATIVE_SHELL_REQUIRED}" = true ] &&
             { [ "${VERSION}" != "${NATIVE_SHELL_VERSION}" ] ||
               [ "${VERSION}" != "${NATIVE_SHELL_CRATE_VERSION}" ]; }; then
            echo "::error::Native shell metadata drift — bump desktop/sage-shell/tauri.conf.json and Cargo.toml to ${VERSION} before tagging"
            exit 1
          fi
          # The native shell has not passed signing, installed-runtime, update,
          # rollback, or accessibility promotion. Its package evidence must keep
          # the explicit preview identity until that separate promotion lands.
          if [ "${NATIVE_SHELL_REQUIRED}" = true ] &&
             { [ "${NATIVE_SHELL_PRODUCT_NAME}" != "SAGE Native Preview" ] ||
               [ "${NATIVE_SHELL_IDENTIFIER}" != "com.sage.native-preview" ]; }; then
            echo "::error::Unsigned native shell evidence must retain the SAGE Native Preview identity; production identity requires signed/runtime promotion evidence"
            exit 1
          fi
          if [ "${SERVER_IMAGE_COUNT}" -ne 1 ] ||
             [ "${SERVER_IMAGE}" != "ghcr.io/l33tdawg/sage:${VERSION}" ]; then
            echo "::error::server.json must contain exactly the release image ghcr.io/l33tdawg/sage:${VERSION}"
            exit 1
          fi

          PRERELEASE=false
          if [[ "${VERSION}" == *-* ]]; then
            PRERELEASE=true
          fi
          if [ "${PRERELEASE}" = false ]; then
            NEWEST_STABLE_TAG=$(
              git tag --merged refs/remotes/origin/main |
                grep -E '^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$' |
                sort -V |
                tail -1 || true
            )
            if [ -n "${NEWEST_STABLE_TAG}" ] &&
               [ "${RELEASE_TAG}" != "${NEWEST_STABLE_TAG}" ]; then
              echo "::error::Refusing stale stable release ${RELEASE_TAG}; newest protected-main tag is ${NEWEST_STABLE_TAG}"
              exit 1
            fi
          fi
          echo "tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${PRERELEASE}" >> "${GITHUB_OUTPUT}"
          echo "native_shell_version=${NATIVE_SHELL_VERSION}" >> "${GITHUB_OUTPUT}"
          if [ "${NATIVE_SHELL_REQUIRED}" = true ]; then
            echo "native_shell_release_class=unsigned-preview-evidence" >> "${GITHUB_OUTPUT}"
          else
            echo "native_shell_release_class=not-required" >> "${GITHUB_OUTPUT}"
          fi
          echo "native_shell_required=${NATIVE_SHELL_REQUIRED}" >> "${GITHUB_OUTPUT}"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.release_tag) || github.ref }}
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.25'
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2
          install-mode: binary
      - name: golangci-lint (natter)
        run: |
          cd natter
          golangci-lint run ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.release_tag) || github.ref }}
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.25'
          cache: true
      - run: go test ./... -count=1 -race -timeout 30m
      - name: Test local CometBFT hardening
        run: make test-cometbft-patch
      - name: Run natter tests
        run: |
          cd natter
          go test ./... -count=1 -race

  v119-fault-gates:
    name: v11.9 Multi-Process Fault Gates
    needs: test
    uses: ./.github/workflows/v11.9-fault-gates.yml
    with:
      # These became permanent release invariants when app-v20/state-sync
      # shipped; later minors and majors must not silently drop the proofs.
      require_scoped_reconfiguration: true
      require_authorized_state_sync: true
      release_ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.release_tag) || github.ref }}

  frontend-static:
    name: Frontend Static Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.release_tag) || github.ref }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
      - run: npm test

  quality-gate:
    name: Quality and Chaos Fan-In
    runs-on: ubuntu-latest
    needs: [release-metadata, lint, test, frontend-static, v119-fault-gates]
    steps:
      - run: echo "All source, race, lint, frontend, and v11.9 fault gates passed."

  native-shell-release-evidence:
    name: Build Unsigned Native Shell Release Evidence (${{ matrix.id }})
    if: needs.release-metadata.outputs.native_shell_required == 'true'
    runs-on: ${{ matrix.os }}
    needs: [quality-gate, release-metadata]
    timeout-minutes: 45
    env:
      NATIVE_SHELL_VERSION: ${{ needs.release-metadata.outputs.native_shell_version }}
      NATIVE_SHELL_RELEASE_CLASS: ${{ needs.release-metadata.outputs.native_shell_release_class }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: macos-arm64
            os: macos-14
            rust-target: aarch64-apple-darwin
            bundles: app
          - id: windows-x64
            os: windows-2025
            rust-target: x86_64-pc-windows-msvc
            bundles: nsis
          - id: linux-x64
            os: ubuntu-24.04
            rust-target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.release_tag) || github.ref }}
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # vstable-2026-07-19
        with:
          targets: ${{ matrix.rust-target }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: desktop/sage-shell
      - name: Install Linux WebView build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Test native shell control contract
        shell: bash
        run: |
          go test ./internal/shellcontrol -count=1
          go test ./cmd/sage-gui -run 'Test(LocalAgentKeyResolver|ShellStartupProof)' -count=1
      - name: Test and lint the locked native shell
        shell: bash
        run: |
          cargo fmt --manifest-path desktop/sage-shell/Cargo.toml -- --check
          cargo test --locked --manifest-path desktop/sage-shell/Cargo.toml
          cargo test --locked --target ${{ matrix.rust-target }} \
            --manifest-path desktop/sage-shell/Cargo.toml --no-run
          cargo clippy --locked --target ${{ matrix.rust-target }} \
            --manifest-path desktop/sage-shell/Cargo.toml --all-targets -- -D warnings
      - name: Audit locked native dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cargo install cargo-audit --version 0.22.2 --locked
          cargo audit --file desktop/sage-shell/Cargo.lock
      - name: Stage version-matched bundled daemon
        shell: bash
        env:
          SAGE_DAEMON_VERSION: ${{ env.NATIVE_SHELL_VERSION }}
        run: scripts/stage-native-shell-daemon.sh ${{ matrix.rust-target }}
      - name: Install pinned Tauri packager
        shell: bash
        run: cargo install tauri-cli --version 2.11.4 --locked
      - name: Build unsigned preview package evidence
        shell: bash
        working-directory: desktop/sage-shell
        run: |
          cargo tauri build --ci \
            --target ${{ matrix.rust-target }} \
            --bundles ${{ matrix.bundles }} \
            --config "{\"version\":\"${NATIVE_SHELL_VERSION}\"}"
      - name: Verify macOS or Windows native release pair
        if: runner.os != 'Linux'
        shell: bash
        run: |
          scripts/verify-native-shell-bundle.sh \
            ${{ matrix.rust-target }} \
            desktop/sage-shell/target/${{ matrix.rust-target }}/release/bundle \
            "${NATIVE_SHELL_VERSION}" \
            desktop/sage-shell/target/${{ matrix.rust-target }}/release/bundle/native-shell-release-pair.json \
            ${{ matrix.bundles }}
      - name: Verify Linux native release pairs
        if: runner.os == 'Linux'
        shell: bash
        run: |
          for package_kind in deb appimage; do
            scripts/verify-native-shell-bundle.sh \
              ${{ matrix.rust-target }} \
              desktop/sage-shell/target/${{ matrix.rust-target }}/release/bundle \
              "${NATIVE_SHELL_VERSION}" \
              "desktop/sage-shell/target/${{ matrix.rust-target }}/release/bundle/native-shell-release-pair-${package_kind}.json" \
              "${package_kind}"
          done
      - name: Generate native dependency SBOM
        shell: bash
        run: |
          cargo install cargo-cyclonedx --version 0.5.9 --locked
          cargo cyclonedx --manifest-path desktop/sage-shell/Cargo.toml \
            --format json --target all --license-strict \
            --override-filename native-shell-${{ matrix.id }}.cdx
          jq -e --arg version "${NATIVE_SHELL_VERSION}" \
            '.bomFormat == "CycloneDX" and .metadata.component.name == "sage-shell" and .metadata.component.version == $version' \
            "desktop/sage-shell/native-shell-${{ matrix.id }}.cdx.json"
      - name: Stage immutable unsigned evidence
        shell: bash
        env:
          EVIDENCE_DIR: ${{ runner.temp }}/native-shell-release-evidence/${{ matrix.id }}
        run: |
          set -euo pipefail
          mkdir -p "${EVIDENCE_DIR}"
          cp -a "desktop/sage-shell/target/${{ matrix.rust-target }}/release/bundle" \
            "${EVIDENCE_DIR}/bundle"
          cp "desktop/sage-shell/native-shell-${{ matrix.id }}.cdx.json" "${EVIDENCE_DIR}/"
          cat > "${EVIDENCE_DIR}/UNSIGNED-NATIVE-SHELL-EVIDENCE.txt" <<'EOF'
          UNSIGNED PREVIEW EVIDENCE ONLY
          These native shell packages are not production release assets.
          Signing, notarization, installed-runtime, update/rollback, accessibility,
          and recovery promotion evidence remains mandatory before standalone release.
          EOF
          (
            cd "${EVIDENCE_DIR}"
            find . -type f ! -name SHA256SUMS -print | LC_ALL=C sort |
              while IFS= read -r evidence_file; do
                if command -v sha256sum >/dev/null 2>&1; then
                  sha256sum "${evidence_file}"
                else
                  shasum -a 256 "${evidence_file}"
                fi
              done > SHA256SUMS
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum -c SHA256SUMS
            else
              shasum -a 256 -c SHA256SUMS
            fi
          )
      - name: Upload private unsigned native evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-evidence-native-shell-${{ matrix.id }}
          path: ${{ runner.temp }}/native-shell-release-evidence/${{ matrix.id }}
          if-no-files-found: error
          retention-days: 7

  native-shell-production-promotion:
    name: Native Standalone Production Promotion Gate
    runs-on: ubuntu-latest
    needs: [release-metadata, native-shell-release-evidence]
    if: >-
      ${{ always() &&
          needs.release-metadata.result == 'success' &&
          (needs.release-metadata.outputs.native_shell_required != 'true' ||
           needs.native-shell-release-evidence.result == 'success') }}
    steps:
      # The native shell is ALPHA through the v11.11-v11.13 bridge. It is built
      # and tested in CI, and is deliberately never staged as a public release
      # asset: stage-github-release downloads only `release-assets-*`, and
      # release-workflow.test.mjs asserts native evidence is excluded from it.
      #
      # This job therefore does not block the release. Blocking every other
      # channel (Docker, SDK, MCP, legacy installers, the GitHub release) on
      # productizing an artifact that no user receives bought nothing and only
      # prevented v11.11 from shipping at all.
      #
      # It stays as a fail-closed guard on the one thing that does matter: if a
      # future change ever tries to DISTRIBUTE the native shell, it must first
      # carry the signing/notarization, installed-runtime, update/rollback and
      # recovery evidence in docs/native-shell-quality-gates.md. That bar
      # applies at first distribution, which the roadmap places at v12.
      - name: Confirm the native shell is alpha and not distributed
        env:
          NATIVE_SHELL_VERSION: ${{ needs.release-metadata.outputs.native_shell_version }}
          NATIVE_SHELL_RELEASE_CLASS: ${{ needs.release-metadata.outputs.native_shell_release_class }}
        run: |
          set -euo pipefail
          if [ "${NATIVE_SHELL_RELEASE_CLASS}" = "not-required" ]; then
            echo "Native standalone promotion does not apply before v11.11.0."
            exit 0
          fi
          if [ "${NATIVE_SHELL_RELEASE_CLASS}" != "unsigned-preview-evidence" ]; then
            echo "::error::Native shell release class is '${NATIVE_SHELL_RELEASE_CLASS}', which means this release intends to distribute the native shell. Distribution requires signed/notarized packages, installed-runtime acceptance, update/rollback, and recovery evidence first; see docs/native-shell-quality-gates.md."
            exit 1
          fi
          echo "Native shell ${NATIVE_SHELL_VERSION} is alpha CI evidence and is not distributed in this release; the rest of the publication graph proceeds."

  goreleaser-prepare:
    name: Prepare GoReleaser Tarballs
    runs-on: ubuntu-latest
    needs: [quality-gate, release-metadata]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.release_tag) || github.ref }}
          fetch-depth: 0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.25'
          cache: true

      - name: Build release archives without publishing
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: 'v2.8.2'
          args: release --clean --skip=publish

      - name: Verify module metadata and stage stable Linux archive
        env:
          RELEASE_VERSION: ${{ needs.release-metadata.outputs.version }}
        run: |
          set -euo pipefail
          git diff --exit-code -- go.mod go.sum
          cp "dist/sage-gui_${RELEASE_VERSION}_linux_amd64.tar.gz" \
             "dist/sage-gui-linux-amd64.tar.gz"
          cd dist
          sha256sum sage-gui-linux-amd64.tar.gz > sage-gui-linux-amd64.tar.gz.sha256
          sha256sum -c checksums.txt
          sha256sum -c sage-gui-linux-amd64.tar.gz.sha256

      - name: Upload private GoReleaser assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets-goreleaser
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
            dist/sage-gui-linux-amd64.tar.gz.sha256
          if-no-files-found: error
          retention-days: 7

  linux-desktop:
    name: Prepare Linux Desktop Bundle
    runs-on: ubuntu-latest
    needs: [quality-gate, release-metadata]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.release_tag) || github.ref }}
          fetch-depth: 0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.25'
          cache: true

      - name: Build Linux desktop bundle
        env:
          SAGE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: ./installer/linux/build-linux.sh

      - name: Stage stable name and checksums
        env:
          RELEASE_VERSION: ${{ needs.release-metadata.outputs.version }}
        run: |
          set -euo pipefail
          cd dist/linux-amd64
          cp "sage-desktop_${RELEASE_VERSION}_linux_amd64.tar.gz" \
             "sage-desktop-linux-amd64.tar.gz"
          for file in "sage-desktop_${RELEASE_VERSION}_linux_amd64.tar.gz" \
                      "sage-desktop-linux-amd64.tar.gz"; do
            sha256sum "${file}" > "${file}.sha256"
            sha256sum -c "${file}.sha256"
          done

      - name: Upload private Linux assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets-linux-desktop
          path: |
            dist/linux-amd64/*.tar.gz
            dist/linux-amd64/*.tar.gz.sha256
          if-no-files-found: error
          retention-days: 7

  macos-dmg:
    name: Prepare macOS DMG (${{ matrix.arch }})
    runs-on: macos-latest
    needs: [quality-gate, release-metadata]
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, amd64]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.release_tag) || github.ref }}
          fetch-depth: 0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.25'
          cache: true

      - name: Build DMG
        env:
          SAGE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          SAGE_ARCH: ${{ matrix.arch }}
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
          NOTARIZE: '1'
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: |
          set -euo pipefail
          for required in APPLE_CERTIFICATE_BASE64 APPLE_CERTIFICATE_PASSWORD \
                          SIGN_IDENTITY APPLE_ID APPLE_TEAM_ID APPLE_PASSWORD; do
            if [ -z "${!required:-}" ]; then
              echo "::error::Required macOS signing/notarization secret is missing: ${required}"
              exit 1
            fi
          done
          printf '%s' "${APPLE_CERTIFICATE_BASE64}" | base64 --decode > /tmp/cert.p12
          KEYCHAIN_PASSWORD=$(openssl rand -hex 12)
          security create-keychain -p "${KEYCHAIN_PASSWORD}" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" build.keychain
          security import /tmp/cert.p12 -k build.keychain \
            -P "${APPLE_CERTIFICATE_PASSWORD}" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "${KEYCHAIN_PASSWORD}" build.keychain
          rm /tmp/cert.p12
          ./installer/macos/build-dmg.sh

          if [ "${SAGE_ARCH}" = amd64 ]; then
            ARCH_LABEL=x86_64
          else
            ARCH_LABEL=arm64
          fi
          APP_PATH="dist/macos-${ARCH_LABEL}/SAGE.app"
          DMG_PATH="dist/macos-${ARCH_LABEL}/SAGE-${SAGE_VERSION}-macOS-${ARCH_LABEL}.dmg"
          codesign --verify --deep --strict --verbose=2 "${APP_PATH}"
          xcrun stapler validate "${DMG_PATH}"

          MOUNT_POINT=$(mktemp -d)
          cleanup_mount() {
            hdiutil detach "${MOUNT_POINT}" >/dev/null 2>&1 || true
            rmdir "${MOUNT_POINT}" >/dev/null 2>&1 || true
          }
          trap cleanup_mount EXIT
          hdiutil attach -readonly -nobrowse -mountpoint "${MOUNT_POINT}" "${DMG_PATH}"
          codesign --verify --deep --strict --verbose=2 "${MOUNT_POINT}/SAGE.app"
          spctl --assess --type execute --verbose=4 "${MOUNT_POINT}/SAGE.app"
          cleanup_mount
          trap - EXIT

      - name: Determine architecture label
        id: arch
        run: |
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            echo "label=x86_64" >> "${GITHUB_OUTPUT}"
          else
            echo "label=arm64" >> "${GITHUB_OUTPUT}"
          fi

      - name: Stage stable name and checksums
        env:
          ARCH_LABEL: ${{ steps.arch.outputs.label }}
        run: |
          set -euo pipefail
          cd "dist/macos-${ARCH_LABEL}"
          cp "SAGE-${RELEASE_TAG}-macOS-${ARCH_LABEL}.dmg" \
             "SAGE-macOS-${ARCH_LABEL}.dmg"
          for file in "SAGE-${RELEASE_TAG}-macOS-${ARCH_LABEL}.dmg" \
                      "SAGE-macOS-${ARCH_LABEL}.dmg"; do
            shasum -a 256 "${file}" > "${file}.sha256"
            shasum -a 256 -c "${file}.sha256"
          done

      - name: Upload private macOS assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets-macos-${{ steps.arch.outputs.label }}
          path: |
            dist/macos-${{ steps.arch.outputs.label }}/*.dmg
            dist/macos-${{ steps.arch.outputs.label }}/*.dmg.sha256
          if-no-files-found: error
          retention-days: 7

  windows-exe:
    name: Prepare Windows Installer
    runs-on: ubuntu-latest
    needs: [quality-gate, release-metadata]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.release_tag) || github.ref }}
          fetch-depth: 0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.25'
          cache: true

      - name: Install NSIS
        run: sudo apt-get update && sudo apt-get install -y nsis nsis-pluginapi

      - name: Install EnVar plugin for NSIS
        run: |
          wget -q https://nsis.sourceforge.io/mediawiki/images/7/7f/EnVar_plugin.zip -O /tmp/envar.zip
          echo "e9aa92de351345ed82795251d838f1ae9041ba35af9d381a5780c7843b01f56a  /tmp/envar.zip" | sha256sum -c -
          sudo unzip -o /tmp/envar.zip -d /usr/share/nsis/

      - name: Build Windows installer
        env:
          SAGE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: ./installer/windows/build-exe.sh

      - name: Stage stable name and checksums
        run: |
          set -euo pipefail
          cd dist/windows-amd64
          cp "SAGE-${RELEASE_TAG}-Windows-Setup.exe" "SAGE-Windows-Setup.exe"
          for file in "SAGE-${RELEASE_TAG}-Windows-Setup.exe" \
                      "SAGE-Windows-Setup.exe"; do
            sha256sum "${file}" > "${file}.sha256"
            sha256sum -c "${file}.sha256"
          done

      - name: Upload private Windows assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets-windows
          path: |
            dist/windows-amd64/*.exe
            dist/windows-amd64/*.exe.sha256
          if-no-files-found: error
          retention-days: 7

  docker-image:
    name: Prepare Multi-Architecture Docker Image
    runs-on: ubuntu-latest
    needs: [quality-gate, release-metadata]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.release_tag) || github.ref }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build private OCI archive
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          build-args: |
            VERSION=${{ needs.release-metadata.outputs.version }}
            COMMIT=${{ github.sha }}
          tags: ghcr.io/l33tdawg/sage:${{ needs.release-metadata.outputs.version }}
          outputs: type=oci,dest=${{ runner.temp }}/sage-image.tar

      - name: Inspect private OCI archive
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y skopeo
          skopeo inspect --raw "oci-archive:${RUNNER_TEMP}/sage-image.tar" > "${RUNNER_TEMP}/sage-image-index.json"
          jq -e '[.manifests[] | select(.platform.os == "linux" and .platform.architecture == "amd64")] | length >= 1' \
             "${RUNNER_TEMP}/sage-image-index.json"
          jq -e '[.manifests[] | select(.platform.os == "linux" and .platform.architecture == "arm64")] | length >= 1' \
             "${RUNNER_TEMP}/sage-image-index.json"
          test -s "${RUNNER_TEMP}/sage-image.tar"

      - name: Upload private Docker image
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-image-docker
          path: ${{ runner.temp }}/sage-image.tar
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

  python-package:
    name: Prepare and Test Python SDK Package
    runs-on: ubuntu-latest
    needs: [quality-gate, release-metadata]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.release_tag) || github.ref }}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Test SDK and build wheel plus sdist
        env:
          RELEASE_VERSION: ${{ needs.release-metadata.outputs.version }}
        run: |
          set -euo pipefail
          cd sdk/python
          python -m pip install --upgrade build twine
          python -m pip install -e ".[dev]"
          pytest -v
          python -m build
          python -m twine check dist/*
          test "$(find dist -maxdepth 1 -type f -name '*.whl' | wc -l)" -eq 1
          test "$(find dist -maxdepth 1 -type f -name '*.tar.gz' | wc -l)" -eq 1
          python -m venv "${RUNNER_TEMP}/sage-wheel-smoke"
          "${RUNNER_TEMP}/sage-wheel-smoke/bin/pip" install dist/*.whl
          "${RUNNER_TEMP}/sage-wheel-smoke/bin/python" -c \
            "import sage_sdk; assert sage_sdk.__version__ == '${RELEASE_VERSION}'"

      - name: Upload private Python package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-package-python
          path: sdk/python/dist/*
          if-no-files-found: error
          retention-days: 7

  mcp-package:
    name: Prepare MCP Registry Manifest and Publisher
    runs-on: ubuntu-latest
    needs: [quality-gate, release-metadata]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.release_tag) || github.ref }}

      - name: Verify manifest and fetch pinned publisher
        env:
          RELEASE_VERSION: ${{ needs.release-metadata.outputs.version }}
        run: |
          set -euo pipefail
          jq -e --arg version "${RELEASE_VERSION}" '.version == $version' server.json
          jq -e --arg image "ghcr.io/l33tdawg/sage:${RELEASE_VERSION}" \
             '[.packages[] | select(.registryType == "oci" and .identifier == $image)] | length == 1' \
             server.json
          curl --fail --location --silent --show-error --retry 3 \
            --output mcp-publisher.tar.gz \
            "https://github.com/modelcontextprotocol/registry/releases/download/v1.7.9/mcp-publisher_linux_amd64.tar.gz"
          echo "ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac  mcp-publisher.tar.gz" | sha256sum -c -
          tar xzf mcp-publisher.tar.gz mcp-publisher
          test -x mcp-publisher

      - name: Upload private MCP publication inputs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-package-mcp
          path: |
            server.json
            mcp-publisher
          if-no-files-found: error
          retention-days: 7

  publication-gate:
    name: Artifact and Package Publication Gate
    runs-on: ubuntu-latest
    needs:
      - release-metadata
      - goreleaser-prepare
      - linux-desktop
      - macos-dmg
      - windows-exe
      - docker-image
      - python-package
      - mcp-package
      - native-shell-production-promotion
    steps:
      - name: Download every private release input
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: staged

      - name: Verify complete artifact inventory and checksums
        env:
          RELEASE_VERSION: ${{ needs.release-metadata.outputs.version }}
          NATIVE_SHELL_REQUIRED: ${{ needs.release-metadata.outputs.native_shell_required }}
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          set -euo pipefail

          test -n "${PYPI_API_TOKEN}"
          if find staged -type f -empty -print -quit | grep -q .; then
            echo "::error::Release staging contains an empty artifact"
            exit 1
          fi

          test -f "staged/release-assets-goreleaser/checksums.txt"
          test -f "staged/release-assets-goreleaser/sage-gui_${RELEASE_VERSION}_linux_amd64.tar.gz"
          test -f "staged/release-assets-goreleaser/sage-gui-linux-amd64.tar.gz"
          test -f "staged/release-assets-linux-desktop/sage-desktop_${RELEASE_VERSION}_linux_amd64.tar.gz"
          test -f "staged/release-assets-macos-arm64/SAGE-${RELEASE_TAG}-macOS-arm64.dmg"
          test -f "staged/release-assets-macos-x86_64/SAGE-${RELEASE_TAG}-macOS-x86_64.dmg"
          test -f "staged/release-assets-windows/SAGE-${RELEASE_TAG}-Windows-Setup.exe"
          test "$(find staged/release-package-python -maxdepth 1 -type f -name '*.whl' | wc -l)" -eq 1
          test "$(find staged/release-package-python -maxdepth 1 -type f -name '*.tar.gz' | wc -l)" -eq 1
          test -s staged/release-image-docker/sage-image.tar
          test -s staged/release-package-mcp/mcp-publisher
          jq -e --arg version "${RELEASE_VERSION}" '.version == $version' \
             staged/release-package-mcp/server.json

          verify_native_release_pair() {
            local evidence_root=$1
            local evidence_file=$2
            local expected_target=$3
            local expected_kind=$4
            local relative_path expected_sha256 actual_sha256

            test -s "${evidence_file}"
            jq -e --arg target "${expected_target}" --arg version "${RELEASE_VERSION}" --arg kind "${expected_kind}" '
              .schema == "dev.sage.native-shell.release-pair/v1" and
              .target == $target and
              .build_version == $version and
              .shell_artifact.kind == $kind and
              (.shell_artifact.path | type == "string" and length > 0) and
              (.shell_artifact.size_bytes | type == "number" and . > 0) and
              (.shell_artifact.sha256 | test("^[0-9a-f]{64}$")) and
              (.bundled_daemon.name | type == "string" and length > 0) and
              (.bundled_daemon.package_path | type == "string" and length > 0) and
              (.bundled_daemon.size_bytes | type == "number" and . > 0) and
              (.bundled_daemon.sha256 | test("^[0-9a-f]{64}$"))
            ' "${evidence_file}" > /dev/null

            relative_path=$(jq -er '.shell_artifact.path' "${evidence_file}")
            case "${relative_path}" in
              ''|/*|*..*|*\\*)
                echo "::error::Unsafe native shell artifact path in ${evidence_file}: ${relative_path}"
                exit 1
                ;;
            esac
            expected_sha256=$(jq -er '.shell_artifact.sha256' "${evidence_file}")
            test -f "${evidence_root}/bundle/${relative_path}"
            actual_sha256=$(sha256sum "${evidence_root}/bundle/${relative_path}" | awk '{print $1}')
            test "${actual_sha256}" = "${expected_sha256}"
          }

          if [ "${NATIVE_SHELL_REQUIRED}" = true ]; then
            for evidence_id in macos-arm64 windows-x64 linux-x64; do
              evidence_root="staged/release-evidence-native-shell-${evidence_id}"
              test -f "${evidence_root}/SHA256SUMS"
              test -s "${evidence_root}/UNSIGNED-NATIVE-SHELL-EVIDENCE.txt"
              grep -Fx 'UNSIGNED PREVIEW EVIDENCE ONLY' \
                "${evidence_root}/UNSIGNED-NATIVE-SHELL-EVIDENCE.txt"
              (
                cd "${evidence_root}"
                sha256sum -c SHA256SUMS
              )
              jq -e --arg version "${RELEASE_VERSION}" '
                .bomFormat == "CycloneDX" and
                .metadata.component.name == "sage-shell" and
                .metadata.component.version == $version
              ' "${evidence_root}/native-shell-${evidence_id}.cdx.json" > /dev/null
            done
            verify_native_release_pair \
              staged/release-evidence-native-shell-macos-arm64 \
              staged/release-evidence-native-shell-macos-arm64/bundle/native-shell-release-pair.json \
              aarch64-apple-darwin app
            verify_native_release_pair \
              staged/release-evidence-native-shell-windows-x64 \
              staged/release-evidence-native-shell-windows-x64/bundle/native-shell-release-pair.json \
              x86_64-pc-windows-msvc nsis
            verify_native_release_pair \
              staged/release-evidence-native-shell-linux-x64 \
              staged/release-evidence-native-shell-linux-x64/bundle/native-shell-release-pair-deb.json \
              x86_64-unknown-linux-gnu deb
            verify_native_release_pair \
              staged/release-evidence-native-shell-linux-x64 \
              staged/release-evidence-native-shell-linux-x64/bundle/native-shell-release-pair-appimage.json \
              x86_64-unknown-linux-gnu appimage
          fi

          # PyPI is immutable. If this is a recovery run and the version is
          # already present, require every public digest to match the exact
          # staged wheel/sdist before any other public channel is touched.
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path
          from urllib.error import HTTPError
          from urllib.parse import quote
          from urllib.request import urlopen

          version = os.environ["RELEASE_VERSION"]
          package_dir = Path("staged/release-package-python")
          local = {
              path.name: hashlib.sha256(path.read_bytes()).hexdigest()
              for path in package_dir.iterdir()
              if path.is_file()
          }
          url = f"https://pypi.org/pypi/sage-agent-sdk/{quote(version, safe='')}/json"
          try:
              with urlopen(url, timeout=20) as response:  # noqa: S310 - fixed PyPI origin
                  payload = json.load(response)
          except HTTPError as exc:
              if exc.code == 404:
                  print(f"PyPI version {version} is not published yet")
                  raise SystemExit(0)
              raise

          remote = {
              item["filename"]: item["digests"]["sha256"]
              for item in payload["urls"]
          }
          if remote != local:
              raise SystemExit(
                  f"PyPI {version} already exists with different files or digests: "
                  f"local={local!r} remote={remote!r}"
              )
          print(f"PyPI version {version} already contains the exact staged files")
          PY

          (
            cd staged/release-assets-goreleaser
            sha256sum -c checksums.txt
          )
          while IFS= read -r checksum; do
            (
              cd "$(dirname "${checksum}")"
              sha256sum -c "$(basename "${checksum}")"
            )
          done < <(find staged/release-assets-* -type f -name '*.sha256' -print | sort)
          tar tf staged/release-image-docker/sage-image.tar > /dev/null

  stage-github-release:
    name: Stage Private GitHub Draft
    runs-on: ubuntu-latest
    needs: [publication-gate, release-metadata]
    permissions:
      contents: write
    steps:
      - name: Download public release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: Create or resume private draft and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_VERSION: ${{ needs.release-metadata.outputs.version }}
          RELEASE_PRERELEASE: ${{ needs.release-metadata.outputs.prerelease }}
        run: |
          set -euo pipefail

          if RELEASE_JSON=$(gh release view "${RELEASE_TAG}" --json isDraft,isPrerelease 2>/dev/null); then
            if [ "$(jq -r '.isDraft' <<< "${RELEASE_JSON}")" != "true" ]; then
              echo "::error::A public GitHub release already exists for ${RELEASE_TAG}"
              exit 1
            fi
            if [ "$(jq -r '.isPrerelease' <<< "${RELEASE_JSON}")" != "${RELEASE_PRERELEASE}" ]; then
              echo "::error::Existing draft prerelease state does not match the tag"
              exit 1
            fi
          else
            CREATE_ARGS=(
              "${RELEASE_TAG}"
              --draft
              --verify-tag
              --generate-notes
              --title "SAGE v${RELEASE_VERSION}"
              --notes "Sovereign Agent Governed Experience — persistent, governed memory for AI agents."
            )
            if [ "${RELEASE_PRERELEASE}" = "true" ]; then
              CREATE_ARGS+=(--prerelease --latest=false)
            fi
            gh release create "${CREATE_ARGS[@]}"
          fi

          gh release upload "${RELEASE_TAG}" release-assets/* --clobber
          find release-assets -maxdepth 1 -type f -exec basename {} \; | sort > /tmp/local-assets.txt
          gh release view "${RELEASE_TAG}" --json assets --jq '.assets[].name' | sort > /tmp/remote-assets.txt
          diff -u /tmp/local-assets.txt /tmp/remote-assets.txt

  publish-docker-version:
    name: Publish Immutable Docker Version
    runs-on: ubuntu-latest
    needs: [stage-github-release, release-metadata]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download private OCI archive
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-image-docker
          path: docker-image

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish and verify versioned multi-architecture image
        env:
          RELEASE_VERSION: ${{ needs.release-metadata.outputs.version }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y skopeo
          skopeo inspect --raw oci-archive:docker-image/sage-image.tar > /tmp/local-index.json
          # Listing tags distinguishes a genuinely absent version from an auth,
          # registry, or network error. Any failure here is fatal and cannot
          # fall through to a potentially destructive copy.
          skopeo list-tags docker://ghcr.io/l33tdawg/sage > /tmp/remote-tags.json
          jq -e '.Tags | type == "array"' /tmp/remote-tags.json > /dev/null
          if jq -e --arg version "${RELEASE_VERSION}" \
             '.Tags | index($version) != null' /tmp/remote-tags.json > /dev/null; then
            skopeo inspect --raw "docker://ghcr.io/l33tdawg/sage:${RELEASE_VERSION}" > /tmp/existing-index.json
            if ! cmp -s /tmp/local-index.json /tmp/existing-index.json; then
              echo "::error::Docker version ${RELEASE_VERSION} already exists with a different manifest digest"
              exit 1
            fi
            echo "Docker version ${RELEASE_VERSION} already contains the exact staged manifest"
          else
            skopeo copy --all --preserve-digests \
              oci-archive:docker-image/sage-image.tar \
              "docker://ghcr.io/l33tdawg/sage:${RELEASE_VERSION}"
          fi
          skopeo inspect --raw "docker://ghcr.io/l33tdawg/sage:${RELEASE_VERSION}" > /tmp/remote-index.json
          test "$(sha256sum /tmp/local-index.json | cut -d' ' -f1)" = \
               "$(sha256sum /tmp/remote-index.json | cut -d' ' -f1)"
          jq -e '[.manifests[] | select(.platform.os == "linux" and .platform.architecture == "amd64")] | length >= 1' \
             /tmp/remote-index.json
          jq -e '[.manifests[] | select(.platform.os == "linux" and .platform.architecture == "arm64")] | length >= 1' \
             /tmp/remote-index.json

  publish-mcp:
    name: Publish MCP Registry Version
    runs-on: ubuntu-latest
    needs: [publish-docker-version, release-metadata]
    permissions:
      contents: read
      id-token: write
      packages: read
    steps:
      - name: Download validated MCP inputs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-package-mcp
          path: mcp-package

      - name: Publish manifest that references the live versioned image
        env:
          RELEASE_VERSION: ${{ needs.release-metadata.outputs.version }}
        run: |
          set -euo pipefail
          cd mcp-package
          chmod +x mcp-publisher
          jq -e --arg version "${RELEASE_VERSION}" '.version == $version' server.json
          jq -e --arg image "ghcr.io/l33tdawg/sage:${RELEASE_VERSION}" \
             '[.packages[] | select(.registryType == "oci" and .identifier == $image)] | length == 1' \
             server.json
          STATUS=$(curl --location --silent --show-error \
            --output /tmp/mcp-existing.json \
            --write-out '%{http_code}' \
            "https://registry.modelcontextprotocol.io/v0.1/servers/io.github.l33tdawg%2Fsage/versions/${RELEASE_VERSION}")
          case "${STATUS}" in
            200)
              jq -S '.server' /tmp/mcp-existing.json > /tmp/mcp-existing-server.json
              jq -S '.' server.json > /tmp/mcp-staged-server.json
              diff -u /tmp/mcp-existing-server.json /tmp/mcp-staged-server.json
              echo "MCP version ${RELEASE_VERSION} already contains the exact staged manifest"
              ;;
            404)
              ./mcp-publisher login github-oidc
              ./mcp-publisher publish
              ;;
            *)
              echo "::error::MCP Registry preflight returned HTTP ${STATUS}"
              exit 1
              ;;
          esac
          curl --fail --location --silent --show-error \
            --retry 5 --retry-all-errors --retry-delay 2 \
            --output /tmp/mcp-published.json \
            "https://registry.modelcontextprotocol.io/v0.1/servers/io.github.l33tdawg%2Fsage/versions/${RELEASE_VERSION}"
          jq -S '.server' /tmp/mcp-published.json > /tmp/mcp-published-server.json
          jq -S '.' server.json > /tmp/mcp-staged-server.json
          diff -u /tmp/mcp-staged-server.json /tmp/mcp-published-server.json

  publish-pypi:
    name: Publish Python SDK to PyPI
    runs-on: ubuntu-latest
    needs: [publish-mcp, release-metadata]
    permissions:
      contents: read
    steps:
      - name: Download validated Python package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-package-python
          path: python-dist

      - name: Publish exact staged wheel and sdist
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: python-dist
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

      - name: Verify exact public PyPI digests
        env:
          RELEASE_VERSION: ${{ needs.release-metadata.outputs.version }}
        run: |
          set -euo pipefail
          curl --fail --location --silent --show-error \
            --retry 5 --retry-all-errors --retry-delay 2 \
            --output /tmp/pypi-release.json \
            "https://pypi.org/pypi/sage-agent-sdk/${RELEASE_VERSION}/json"
          test "$(find python-dist -maxdepth 1 -type f | wc -l)" -eq \
               "$(jq '.urls | length' /tmp/pypi-release.json)"
          for file in python-dist/*; do
            filename=$(basename "${file}")
            local_digest=$(sha256sum "${file}" | cut -d' ' -f1)
            remote_digest=$(jq -er --arg filename "${filename}" \
              '.urls[] | select(.filename == $filename) | .digests.sha256' \
              /tmp/pypi-release.json)
            test "${local_digest}" = "${remote_digest}"
          done

  publish-docker-latest:
    name: Promote Docker Latest Pointer
    runs-on: ubuntu-latest
    needs: [publish-pypi, release-metadata]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Leave latest unchanged for prereleases
        if: needs.release-metadata.outputs.prerelease == 'true'
        run: echo "Prerelease tag; ghcr.io/l33tdawg/sage:latest remains unchanged."

      - name: Log in to GitHub Container Registry
        if: needs.release-metadata.outputs.prerelease == 'false'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote and verify latest
        if: needs.release-metadata.outputs.prerelease == 'false'
        env:
          RELEASE_VERSION: ${{ needs.release-metadata.outputs.version }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y skopeo
          skopeo copy --all --preserve-digests \
            "docker://ghcr.io/l33tdawg/sage:${RELEASE_VERSION}" \
            docker://ghcr.io/l33tdawg/sage:latest
          skopeo inspect --raw "docker://ghcr.io/l33tdawg/sage:${RELEASE_VERSION}" > /tmp/version-index.json
          skopeo inspect --raw docker://ghcr.io/l33tdawg/sage:latest > /tmp/latest-index.json
          test "$(sha256sum /tmp/version-index.json | cut -d' ' -f1)" = \
               "$(sha256sum /tmp/latest-index.json | cut -d' ' -f1)"

  publish-github-release:
    name: Publish GitHub Release Last
    runs-on: ubuntu-latest
    needs: [publish-docker-latest, release-metadata]
    permissions:
      contents: write
    steps:
      - name: Publish the complete draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_PRERELEASE: ${{ needs.release-metadata.outputs.prerelease }}
        run: |
          set -euo pipefail
          if [ "$(gh release view "${RELEASE_TAG}" --json isDraft --jq '.isDraft')" = "true" ]; then
            if [ "${RELEASE_PRERELEASE}" = "true" ]; then
              gh release edit "${RELEASE_TAG}" --draft=false --latest=false
            else
              gh release edit "${RELEASE_TAG}" --draft=false --latest
            fi
          fi
          test "$(gh release view "${RELEASE_TAG}" --json isDraft --jq '.isDraft')" = "false"
          test "$(gh release view "${RELEASE_TAG}" --json isPrerelease --jq '.isPrerelease')" = \
               "${RELEASE_PRERELEASE}"
          if [ "${RELEASE_PRERELEASE}" = "false" ]; then
            test "$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq '.tag_name')" = \
                 "${RELEASE_TAG}"
          fi
