version: 2

project_name: sage

before:
  hooks:
    - go mod tidy

builds:
  - id: sage-gui
    main: ./cmd/sage-gui
    binary: sage-gui
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

  - id: amid
    main: ./cmd/amid
    binary: amid
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

  - id: sage-cli
    main: ./cmd/sage-cli
    binary: sage-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

  - id: sage-launcher
    main: ./cmd/sage-launcher
    binary: sage-launcher
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
    overrides:
      - goos: windows
        ldflags:
          - -s -w -H=windowsgui

archives:
  - id: sage-gui
    builds:
      - sage-gui
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      sage-gui_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE

  - id: amid
    builds:
      - amid
    format: tar.gz
    name_template: >-
      amid_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE

  - id: sage-cli
    builds:
      - sage-cli
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      sage-cli_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - Merge pull request

release:
  github:
    owner: l33tdawg
    name: sage
  draft: false
  prerelease: auto
  name_template: "SAGE v{{.Version}}"
  header: |
    ## SAGE v{{.Version}}

    Sovereign Agent Governed Experience — persistent, governed memory for AI agents.

    ### Quick Start (sage-gui)
    ```bash
    # Download and extract for your platform, then:
    ./sage-gui setup    # Interactive setup wizard
    ./sage-gui serve    # Start your personal memory node
    ```

    See the [README](https://github.com/l33tdawg/sage#readme) for full documentation.
